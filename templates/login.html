<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네이버 경쟁사 모니터링 로그인</title>
<link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    background: #fafafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #18181b;
  }
  .card {
    background: #fff;
    border: 1px solid #e4e4e7;
    border-radius: 8px;
    padding: 38px 38px 34px;
    width: 380px;
    box-shadow: 0 1px 3px rgb(0 0 0/.07), 0 1px 2px -1px rgb(0 0 0/.06);
  }
  .logo { margin-bottom: 26px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: #03c75a;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .logo-icon svg { width: 18px; height: 18px; color: #fff; }
  .logo-title { font-size: 18px; font-weight: 600; letter-spacing: -.3px; }
  .logo-sub { font-size: 12px; color: #71717a; margin-top: 3px; }
  .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 18px; }
  .tab {
    border: 1px solid #e4e4e7;
    background: #fff;
    border-radius: 6px;
    padding: 8px;
    font: inherit;
    color: #71717a;
    cursor: pointer;
  }
  .tab.active { background: #18181b; border-color: #18181b; color: #fff; }
  .field { margin-top: 14px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 5px;
  }
  input {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid #e4e4e7;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    color: #18181b;
    background: #fff;
    transition: border-color .12s, box-shadow .12s;
  }
  input:focus { border-color: #86efac; box-shadow: 0 0 0 3px rgba(3,199,90,.08); }
  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 54px; }
  .toggle-password {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    border: 0;
    background: transparent;
    color: #71717a;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 5px;
    font-family: inherit;
  }
  .toggle-password:hover { color: #18181b; }
  .signup-notice {
    display: none;
    margin: 0 0 16px;
    padding: 10px 12px;
    border: 1px solid #86efac;
    border-radius: 6px;
    background: #f0fdf4;
    color: #166534;
    font-size: 12px;
    line-height: 1.6;
  }
  .btn-login {
    width: 100%;
    margin-top: 20px;
    padding: 9px;
    background: #03c75a;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; }
  .msg {
    margin-top: 10px;
    padding: 8px 11px;
    border-radius: 6px;
    font-size: 12px;
    display: none;
    line-height: 1.5;
  }
  .msg.err { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
  .msg.ok { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
  .hint { font-size: 11px; color: #a1a1aa; text-align: center; margin-top: 16px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><polyline points="1,12 5,7 8,9 12,4 15,6"/></svg>
    </div>
    <div class="logo-title">네이버 경쟁사 모니터링</div>
    <div class="logo-sub">수강생 계정으로 로그인하세요</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="setMode('login')">로그인</button>
    <button class="tab" id="tab-signup" onclick="setMode('signup')">회원가입</button>
  </div>

  <div class="signup-notice" id="signup-notice">
    회원가입 후 이메일 인증 링크를 먼저 눌러주세요. 인증이 끝나면 관리자가 승인한 뒤 서비스를 이용할 수 있습니다.
  </div>

  <div class="field">
    <label>이메일</label>
    <input type="email" id="email" placeholder="student@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>비밀번호</label>
    <div class="password-wrap">
      <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
      <button type="button" class="toggle-password" id="toggle-password" onclick="togglePassword()">보기</button>
    </div>
  </div>
  <div class="msg" id="msg"></div>
  <button class="btn-login" id="btn" onclick="submitAuth()">로그인</button>
  <div class="hint">회원가입 후 받은 편지함의 인증 링크를 누르고, 관리자 승인 후 로그인할 수 있습니다.</div>
</div>

<script>
let mode = 'login';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});

init();

async function init() {
  if (localStorage.getItem('naverMonitorAccessToken')) location.href = '/';
}

function setMode(next) {
  mode = next;
  document.getElementById('tab-login').className = 'tab' + (mode === 'login' ? ' active' : '');
  document.getElementById('tab-signup').className = 'tab' + (mode === 'signup' ? ' active' : '');
  document.getElementById('btn').textContent = mode === 'login' ? '로그인' : '회원가입';
  document.getElementById('signup-notice').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  hideMsg();
}

function togglePassword() {
  const input = document.getElementById('password');
  const btn = document.getElementById('toggle-password');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.textContent = show ? '숨김' : '보기';
}

async function submitAuth() {
  const btn = document.getElementById('btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showMsg('이메일과 비밀번호를 입력해주세요.', 'err'); return; }
  btn.disabled = true;
  btn.textContent = mode === 'login' ? '로그인 중...' : '가입 중...';
  try {
    const res = await fetch(mode === 'login' ? '/api/auth/login' : '/api/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '인증에 실패했습니다.');
    if (mode === 'signup') {
      showMsg(data.message || '가입 확인 메일을 보냈습니다. 이메일 인증 후 관리자 승인을 기다려주세요.', 'ok');
      setMode('login');
      return;
    }
    localStorage.setItem('naverMonitorAccessToken', data.access_token);
    if (data.refresh_token) localStorage.setItem('naverMonitorRefreshToken', data.refresh_token);
    location.href = '/';
  } catch (e) {
    showMsg(e.message || '인증에 실패했습니다.', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = mode === 'login' ? '로그인' : '회원가입';
  }
}

function showMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + cls;
  el.style.display = 'block';
}

function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}
</script>
</body>
</html>
